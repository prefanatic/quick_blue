name: Latest Flutter

on:
  schedule:
    - cron: "17 10 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FLUTTER_CHANNEL: stable

jobs:
  validate:
    name: Validate
    runs-on: ${{ fromJSON(vars.LINUX_RUNNER || '"ubuntu-latest"') }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Validate packages
        run: |
          set -euo pipefail

          flutter pub get

          mapfile -t dart_files < <(git ls-files \
            '*.dart' \
            ':!:**/*.g.dart' \
            ':!:quick_blue_linux/lib/generated_bindings.dart')

          dart format --output=none --set-exit-if-changed "${dart_files[@]}"

          (cd quick_blue && dart run pigeon --input pigeons/messages.dart)
          (cd quick_blue_darwin && dart run pigeon --input pigeons/messages.dart)
          (cd quick_blue_windows && dart run pigeon --input pigeons/messages.dart)

          git diff --exit-code -- \
            quick_blue/lib/src/messages.g.dart \
            quick_blue/android/src/main/kotlin/com/example/quick_blue/Messages.g.kt \
            quick_blue_darwin/lib/src/messages.g.dart \
            quick_blue_darwin/darwin/quick_blue_darwin/Sources/quick_blue_darwin/Messages.g.swift \
            quick_blue_windows/lib/src/messages.g.dart \
            quick_blue_windows/windows/messages.g.cpp \
            quick_blue_windows/windows/messages.g.h

          for package in \
            quick_blue \
            quick_blue/example \
            quick_blue_darwin \
            quick_blue_linux \
            quick_blue_platform_interface \
            quick_blue_windows
          do
            echo "::group::flutter analyze $package"
            (cd "$package" && flutter analyze)
            echo "::endgroup::"
          done

          for package in \
            quick_blue \
            quick_blue/example \
            quick_blue_darwin \
            quick_blue_linux \
            quick_blue_platform_interface \
            quick_blue_windows
          do
            echo "::group::flutter test $package"
            (cd "$package" && flutter test)
            echo "::endgroup::"
          done

  build-android:
    name: Build Android
    runs-on: ${{ fromJSON(vars.LINUX_RUNNER || '"ubuntu-latest"') }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Build example
        run: |
          set -euo pipefail

          flutter pub get

          (cd quick_blue/example && flutter build apk --debug)

  build-linux:
    name: Build Linux
    runs-on: ${{ fromJSON(vars.LINUX_RUNNER || '"ubuntu-latest"') }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Build example
        run: |
          set -euo pipefail

          flutter config --enable-linux-desktop
          flutter pub get

          (cd quick_blue/example && flutter build linux --debug)

  build-apple:
    name: Build ${{ matrix.target }}
    if: ${{ vars.SKIP_HOSTED_PLATFORM_BUILDS != 'true' }}
    runs-on: ${{ fromJSON(vars.MACOS_RUNNER || '"macos-latest"') }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: ios
            command: flutter build ios --no-codesign
          - target: macos
            command: flutter build macos --debug

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Enable macOS desktop
        if: ${{ matrix.target == 'macos' }}
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build example
        working-directory: quick_blue/example
        run: ${{ matrix.command }}

  build-windows:
    name: Build Windows
    if: ${{ vars.SKIP_HOSTED_PLATFORM_BUILDS != 'true' }}
    runs-on: ${{ fromJSON(vars.WINDOWS_RUNNER || '"windows-latest"') }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build example
        working-directory: quick_blue/example
        run: flutter build windows --debug
