name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FLUTTER_CHANNEL: stable
  FLUTTER_VERSION: "3.44.2"

# Runner override variables accept JSON. For example:
# LINUX_RUNNER: ["self-hosted","linux","x64"]
# MACOS_RUNNER: "macos-latest"
# WINDOWS_RUNNER: "windows-latest"
jobs:
  changes:
    name: Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      validate: ${{ steps.defaults.outputs.all == 'true' && 'true' || steps.filter.outputs.validate }}
      android: ${{ steps.defaults.outputs.all == 'true' && 'true' || steps.filter.outputs.android }}
      linux: ${{ steps.defaults.outputs.all == 'true' && 'true' || steps.filter.outputs.linux }}
      darwin: ${{ steps.defaults.outputs.all == 'true' && 'true' || steps.filter.outputs.darwin }}
      windows: ${{ steps.defaults.outputs.all == 'true' && 'true' || steps.filter.outputs.windows }}

    steps:
      - name: Run all checks outside pull requests
        id: defaults
        if: ${{ github.event_name != 'pull_request' }}
        run: echo "all=true" >> "$GITHUB_OUTPUT"

      - name: Detect pull request changes
        id: filter
        if: ${{ github.event_name == 'pull_request' }}
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        with:
          filters: |
            validate:
              - '.github/dependabot.yml'
              - '.github/workflows/**'
              - 'scripts/**'
              - 'pubspec.yaml'
              - '**/pubspec.yaml'
              - '**/analysis_options.yaml'
              - '**/ffigen.yaml'
              - '**/.metadata'
              - '**/.gitignore'
              - '**/*.dart'
              - '**/*.kt'
              - '**/*.swift'
              - '**/*.cpp'
              - '**/*.cc'
              - '**/*.c'
              - '**/*.h'
              - '**/*.hpp'
              - '**/*.gradle'
              - '**/*.properties'
              - '**/*.xml'
              - '**/*.podspec'
              - '**/Package.swift'
              - '**/CMakeLists.txt'
            android:
              - '.github/workflows/**'
              - 'pubspec.yaml'
              - 'quick_blue/lib/**'
              - 'quick_blue/pubspec.yaml'
              - 'quick_blue/pigeons/**'
              - 'quick_blue/android/**'
              - 'quick_blue/example/**'
              - 'quick_blue_platform_interface/**'
            linux:
              - '.github/workflows/**'
              - 'pubspec.yaml'
              - 'quick_blue/lib/**'
              - 'quick_blue/pubspec.yaml'
              - 'quick_blue/example/**'
              - 'quick_blue_linux/**'
              - 'quick_blue_platform_interface/**'
            darwin:
              - '.github/workflows/**'
              - 'pubspec.yaml'
              - 'quick_blue/lib/**'
              - 'quick_blue/pubspec.yaml'
              - 'quick_blue/example/**'
              - 'quick_blue_darwin/**'
              - 'quick_blue_platform_interface/**'
            windows:
              - '.github/workflows/**'
              - 'pubspec.yaml'
              - 'quick_blue/lib/**'
              - 'quick_blue/pubspec.yaml'
              - 'quick_blue/example/**'
              - 'quick_blue_windows/**'
              - 'quick_blue_platform_interface/**'

  format:
    name: Format
    needs: changes
    if: ${{ needs.changes.outputs.validate == 'true' }}
    runs-on: ${{ fromJSON(vars.LINUX_RUNNER || '"ubuntu-latest"') }}
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Check formatting
        run: |
          mapfile -t dart_files < <(git ls-files \
            '*.dart' \
            ':!:**/*.g.dart' \
            ':!:quick_blue_linux/lib/generated_bindings.dart')

          dart format --output=none --set-exit-if-changed "${dart_files[@]}"

  generated-code:
    name: Generated code
    needs: changes
    if: ${{ needs.changes.outputs.validate == 'true' }}
    runs-on: ${{ fromJSON(vars.LINUX_RUNNER || '"ubuntu-latest"') }}
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Check generated Pigeon APIs
        run: |
          set -euo pipefail

          flutter pub get

          (cd quick_blue && dart run pigeon --input pigeons/messages.dart)
          (cd quick_blue_darwin && dart run pigeon --input pigeons/messages.dart)
          (cd quick_blue_windows && dart run pigeon --input pigeons/messages.dart)

          git diff --exit-code -- \
            quick_blue/lib/src/messages.g.dart \
            quick_blue/android/src/main/kotlin/com/example/quick_blue/Messages.g.kt \
            quick_blue_darwin/lib/src/messages.g.dart \
            quick_blue_darwin/darwin/quick_blue_darwin/Sources/quick_blue_darwin/Messages.g.swift \
            quick_blue_windows/lib/src/messages.g.dart \
            quick_blue_windows/windows/messages.g.cpp \
            quick_blue_windows/windows/messages.g.h

  analyze:
    name: Analyze ${{ matrix.package }}
    needs: changes
    if: ${{ needs.changes.outputs.validate == 'true' }}
    runs-on: ${{ fromJSON(vars.LINUX_RUNNER || '"ubuntu-latest"') }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        package:
          - quick_blue
          - quick_blue/example
          - quick_blue_darwin
          - quick_blue_linux
          - quick_blue_platform_interface
          - quick_blue_windows

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze package
        working-directory: ${{ matrix.package }}
        run: flutter analyze

  test:
    name: Test ${{ matrix.package }}
    needs: changes
    if: ${{ needs.changes.outputs.validate == 'true' }}
    runs-on: ${{ fromJSON(vars.LINUX_RUNNER || '"ubuntu-latest"') }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        package:
          - quick_blue
          - quick_blue/example
          - quick_blue_darwin
          - quick_blue_linux
          - quick_blue_platform_interface
          - quick_blue_windows

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Test package
        working-directory: ${{ matrix.package }}
        run: flutter test

  build-android:
    name: Build Android
    needs: changes
    if: ${{ needs.changes.outputs.validate == 'true' && needs.changes.outputs.android == 'true' }}
    runs-on: ${{ fromJSON(vars.LINUX_RUNNER || '"ubuntu-latest"') }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Test Android plugin
        working-directory: quick_blue/example/android
        run: ./gradlew :quick_blue:testDebugUnitTest

      - name: Build example
        working-directory: quick_blue/example
        run: flutter build apk --debug

  build-linux:
    name: Build Linux
    needs: changes
    if: ${{ needs.changes.outputs.validate == 'true' && needs.changes.outputs.linux == 'true' }}
    runs-on: ${{ fromJSON(vars.LINUX_RUNNER || '"ubuntu-latest"') }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Build example
        run: |
          set -euo pipefail

          flutter config --enable-linux-desktop
          flutter pub get

          (cd quick_blue/example && flutter build linux --debug)

  build-apple:
    name: Build ${{ matrix.target }}
    needs: changes
    if: ${{ needs.changes.outputs.validate == 'true' && needs.changes.outputs.darwin == 'true' && vars.SKIP_HOSTED_PLATFORM_BUILDS != 'true' }}
    runs-on: ${{ fromJSON(vars.MACOS_RUNNER || '"macos-latest"') }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: ios
            command: flutter build ios --no-codesign
          - target: macos
            command: flutter build macos --debug

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Enable macOS desktop
        if: ${{ matrix.target == 'macos' }}
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build example
        working-directory: quick_blue/example
        run: ${{ matrix.command }}

  build-windows:
    name: Build windows
    needs: changes
    if: ${{ needs.changes.outputs.validate == 'true' && needs.changes.outputs.windows == 'true' && vars.SKIP_HOSTED_PLATFORM_BUILDS != 'true' }}
    runs-on: ${{ fromJSON(vars.WINDOWS_RUNNER || '"windows-latest"') }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build example
        working-directory: quick_blue/example
        run: flutter build windows --debug
